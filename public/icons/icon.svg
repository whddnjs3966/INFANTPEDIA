<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F472B6"/>
      <stop offset="100%" style="stop-color:#B794D6"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="115" fill="url(#bg)"/>

  <!-- Glowing Star -->
  <path d="M 233 130 L 243 155 L 269 155 L 248 171 L 256 196 L 233 181 L 210 196 L 218 171 L 197 155 L 223 155 Z" fill="#FFD700" filter="url(#glow)"/>

  <!-- Pacifier -->
  <g transform="translate(310, 140) rotate(20) scale(1.1)">
    <!-- Ring -->
    <circle cx="0" cy="0" r="14" fill="none" stroke="white" stroke-width="5"/>
    <!-- Guard -->
    <path d="M -22 18 Q 0 30 22 18" fill="none" stroke="white" stroke-width="8" stroke-linecap="round"/>
    <circle cx="0" cy="22" r="7" fill="white"/>
    <!-- Nipple -->
    <path d="M -12 24 C -12 48, 12 48, 12 24" fill="white"/>
  </g>

  <!-- Book -->
  <g transform="translate(0, 30)">
    <!-- Left pages stack -->
    <path d="M 115 325 C 115 325, 170 305, 250 330 L 250 180 C 170 160, 115 180, 115 180 Z" fill="none" stroke="white" stroke-width="20" stroke-linejoin="round"/>
    <path d="M 140 310 C 140 310, 180 295, 240 315" fill="none" stroke="url(#bg)" stroke-width="8" stroke-linecap="round"/>
    
    <!-- Right pages stack -->
    <path d="M 397 325 C 397 325, 342 305, 262 330 L 262 180 C 342 160, 397 180, 397 180 Z" fill="none" stroke="white" stroke-width="20" stroke-linejoin="round"/>
    <path d="M 372 310 C 372 310, 332 295, 272 315" fill="none" stroke="url(#bg)" stroke-width="8" stroke-linecap="round"/>
    
    <!-- Spine -->
    <path d="M 250 330 Q 256 345 262 330 L 262 180 Q 256 195 250 180 Z" fill="white"/>
  </g>
</svg>
