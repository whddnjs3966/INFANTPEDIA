<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#A8E6CF"/>
      <stop offset="100%" style="stop-color:#FFB7B2"/>
    </linearGradient>
  </defs>
  <!-- Soft gradient background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  
  <!-- Baby face -->
  <circle cx="256" cy="260" r="90" fill="#FFECD2" stroke="#E8998D" stroke-width="3"/>
  
  <!-- Ears -->
  <circle cx="166" cy="260" r="18" fill="#FFECD2" stroke="#E8998D" stroke-width="2.5"/>
  <circle cx="346" cy="260" r="18" fill="#FFECD2" stroke="#E8998D" stroke-width="2.5"/>
  
  <!-- Beanie hat -->
  <path d="M170 240 Q170 160 256 150 Q342 160 342 240" fill="#F08080" stroke="#E06060" stroke-width="2.5"/>
  <rect x="170" y="230" width="172" height="20" rx="10" fill="#E06060"/>
  <circle cx="256" cy="150" r="10" fill="#E06060"/>
  
  <!-- Hair peek -->
  <path d="M200 235 Q210 220 230 230" fill="#C8A882" opacity="0.7"/>
  
  <!-- Eyes -->
  <circle cx="226" cy="265" r="10" fill="#4A4A4A"/>
  <circle cx="286" cy="265" r="10" fill="#4A4A4A"/>
  <circle cx="229" cy="261" r="3.5" fill="white"/>
  <circle cx="289" cy="261" r="3.5" fill="white"/>
  
  <!-- Rosy cheeks -->
  <circle cx="200" cy="290" r="18" fill="#FFB7B2" opacity="0.6"/>
  <circle cx="312" cy="290" r="18" fill="#FFB7B2" opacity="0.6"/>
  
  <!-- Smile -->
  <path d="M236 300 Q256 318 276 300" stroke="#E8998D" stroke-width="3.5" fill="none" stroke-linecap="round"/>
</svg>
